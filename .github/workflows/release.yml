name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        working-directory: CodeSquad
        run: BUILD_CONFIG=release ./scripts/build.sh

      - name: Embed VS Code extension in bundle
        run: |
          cp -R CodeSquadExtension CodeSquad/.build/CodeSquad.app/Contents/Resources/CodeSquadExtension
          codesign --force --sign - --identifier com.codesquad.app CodeSquad/.build/CodeSquad.app

      - name: Create zip
        run: |
          cd CodeSquad/.build
          zip -r "../../CodeSquad-${GITHUB_REF_NAME}-arm64.zip" CodeSquad.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "CodeSquad-${{ github.ref_name }}-arm64.zip"
          generate_release_notes: true
